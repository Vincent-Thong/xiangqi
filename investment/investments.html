<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Research Portal</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <common-header></common-header>

    <div class="container">
        <div id="content" class="markdown-body">
            Loading research...
        </div>
    </div>

    <script src="../assets/js/headerFooterManager.js"></script>
    
    <script>
        async function renderMarkdown() {
            try {
                // 1. Get the filename from the URL (e.g., ?ticker=hst-si)
                const urlParams = new URLSearchParams(window.location.search);
                const ticker = urlParams.get('ticker');
                
                // 2. Map the ticker to your file paths
                const fileMap = {
                    '9988': 'equities/9988-hk-alibaba.md',
                    'hst-si': 'equities/hst-si-hstech.md' // Ensure this matches your filename
                };

                // Default to Alibaba if no ticker is provided or if ticker is invalid
                const filePath = fileMap[ticker] || fileMap['9988'];

                const response = await fetch(filePath);
                if (!response.ok) throw new Error("File not found");
                
                const text = await response.text();
                
                // 3. Render Markdown
                document.getElementById('content').innerHTML = marked.parse(text);

                // 4. Trigger MathJax to render LaTeX after content is loaded
                if (window.MathJax) {
                    MathJax.typeset();
                }
            } catch (error) {
                document.getElementById('content').innerHTML = "<h2>Error</h2><p>Research file not found or could not be loaded.</p>";
                console.error(error);
            }
        }

        renderMarkdown();
    </script>
</body>
</html>
