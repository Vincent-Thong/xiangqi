<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
<title>麒麟象棋队</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ui-text);font-family:'Noto Serif SC',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;background-image:radial-gradient(ellipse at 20% 20%,rgba(200,146,42,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(192,57,43,.06) 0%,transparent 60%)}
  h1{font-family:'Cinzel',serif;font-size:2rem;letter-spacing:.2em;color:var(--gold);text-shadow:0 0 20px rgba(212,160,23,.4);margin-bottom:4px}
  .subtitle{font-size:.85rem;color:#8a7050;letter-spacing:.3em;margin-bottom:20px}
  .app{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
  .board-wrap{position:relative;background:var(--board-bg);border:3px solid var(--board-line);border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,.7),inset 0 0 60px rgba(0,0,0,.15);padding:30px}
  canvas#boardCanvas{display:block;cursor:pointer}
  .side{width:240px;display:flex;flex-direction:column;gap:14px}
  #moveList{max-height:220px;overflow-y:auto;font-size:.78rem;line-height:1.8;color:#b09070;scrollbar-width:thin;scrollbar-color:var(--ui-border) transparent}
  #moveList .move-pair{display:flex;gap:6px;padding:2px 0}
  #moveList .move-num{color:#5a4a30;min-width:22px}
  #moveList .mv{padding:1px 5px;border-radius:3px;cursor:pointer}
  #moveList .mv:hover{background:var(--ui-border);color:var(--ui-text)}
  #moveList .mv.current{background:var(--gold);color:var(--bg);font-weight:bold}
  #status{font-size:.85rem;padding:8px;border-radius:4px;background:rgba(200,146,42,.08);border:1px solid var(--ui-border);text-align:center;min-height:36px;line-height:1.4}
  #status.red-turn{border-color:rgba(192,57,43,.4);color:#e07060}
  #status.black-turn{border-color:rgba(100,80,40,.4);color:#b09070}
  #status.check{border-color:var(--red);color:var(--red-light);animation:pulse .6s ease infinite alternate}
  #status.checkmate{border-color:var(--red);color:var(--gold);background:rgba(192,57,43,.15)}
  @keyframes pulse{from{box-shadow:none}to{box-shadow:0 0 12px rgba(192,57,43,.5)}}
  .nav-row{display:flex;gap:8px;justify-content:center;margin-top:12px}
  .nav-btn{flex:1;padding:10px 4px;background:var(--ui-bg);border:1px solid var(--ui-border);border-radius:5px;color:var(--ui-text);font-size:.75rem;font-family:'Noto Serif SC',serif;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px}
  .nav-btn .icon{font-size:1.1rem}
  .nav-btn:hover:not(:disabled){background:var(--ui-border);border-color:var(--gold);color:var(--gold)}
  .nav-btn:disabled{opacity:.3;cursor:default}
  #pgnArea{width:100%;height:90px;background:#0e0c08;border:1px solid var(--ui-border);border-radius:4px;color:#8a7050;font-family:monospace;font-size:.72rem;padding:8px;resize:vertical;margin-bottom:6px}
  #pgnArea:focus{outline:none;border-color:var(--gold)}
  .file-row{display:flex;gap:6px;margin-bottom:6px}
  .file-row .btn{margin-bottom:0}
  input[type="file"]{display:none}
  /* ── Clock ── */
  .clock-display{display:flex;flex-direction:column;gap:8px}
  .clock-side{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:4px;border:1px solid var(--ui-border);transition:background .3s,border-color .3s}
  .clock-side.active{border-color:var(--gold);background:rgba(212,160,23,.08)}
  .clock-side.low{border-color:var(--red)!important;background:rgba(192,57,43,.12)!important;animation:pulse .6s ease infinite alternate}
  .clock-side.flagged{border-color:var(--red)!important;background:rgba(192,57,43,.2)!important}
  .clock-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;color:#6a5a30}
  .clock-label.active{color:var(--gold)}
  .clock-time{font-family:'Cinzel',serif;font-size:1.3rem;letter-spacing:.05em;color:var(--ui-text);font-variant-numeric:tabular-nums}
  .clock-time.low{color:var(--red-light)}
  .clock-controls{display:flex;gap:6px;margin-top:4px}
  .clock-controls .btn{margin-bottom:0;font-size:.75rem;padding:6px 8px}
  .clock-setting{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:.75rem;color:#6a5a30}
  .clock-setting input{width:44px;background:#0e0c08;border:1px solid var(--ui-border);border-radius:3px;color:var(--ui-text);font-family:'Noto Serif SC',serif;font-size:.75rem;padding:3px 6px;text-align:center}
  .clock-setting input:focus{outline:none;border-color:var(--gold)}
</style>
</head>
<body>
<common-header></common-header>
<script src="assets/js/dropdown.js"></script>
<script src="assets/js/headerFooterManager.js"></script>
<h1>象棋</h1>
<div class="subtitle">XIANGQI · CHINESE CHESS</div>
<div class="app">
  <div>
    <div class="board-wrap">
      <canvas id="boardCanvas" width="450" height="500"></canvas>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btnStart" onclick="goToMove(0)"><span class="icon">⏮</span><span>Start</span></button>
      <button class="nav-btn" id="btnPrev" onclick="goToMove(currentMoveIndex-1)"><span class="icon">◀</span><span>Previous</span></button>
      <button class="nav-btn" id="btnNext" onclick="goToMove(currentMoveIndex+1)"><span class="icon">▶</span><span>Next</span></button>
      <button class="nav-btn" id="btnEnd" onclick="goToMove(moveHistory.length)"><span class="icon">⏭</span><span>End</span></button>
    </div>
  </div>
  <div class="side">

    <!-- STATUS -->
    <div class="panel">
      <div class="panel-title">STATUS</div>
      <div id="status" class="red-turn">Red's Turn</div>
    </div>

    <!-- CLOCK -->
    <div class="panel">
      <div class="panel-title">CLOCK · 时钟</div>
      <div class="clock-display">
        <div class="clock-side" id="clockBlack">
          <div>
            <div class="clock-label" id="lblBlack">BLACK</div>
            <div class="clock-time" id="timeBlack">20:00</div>
          </div>
          <span style="font-size:1.2rem;opacity:.4;">⚫</span>
        </div>
        <div class="clock-side active" id="clockRed">
          <div>
            <div class="clock-label active" id="lblRed">RED</div>
            <div class="clock-time" id="timeRed">20:00</div>
          </div>
          <span style="font-size:1.2rem;opacity:.6;">🔴</span>
        </div>
      </div>
      <div class="clock-controls">
        <button class="btn" onclick="clockStart()" id="btnClockStart">▶ Start</button>
        <button class="btn" onclick="clockPause()" id="btnClockPause" disabled>⏸ Pause</button>
        <button class="btn" onclick="clockReset()">↺ Reset</button>
      </div>
      <div class="clock-setting">
        <span>Time</span>
        <input type="number" id="settingMin" value="20" min="1" max="60"> min
        <span>+</span>
        <input type="number" id="settingInc" value="5" min="0" max="60"> sec
      </div>
    </div>

    <!-- GAME -->
    <div class="panel">
      <div class="panel-title">GAME</div>
      <button class="btn" onclick="newGame()">♟ New Game</button>
      <button class="btn danger" onclick="confirmResign()">⚑ Resign</button>
    </div>

    <!-- MOVE LIST -->
    <div class="panel">
      <div class="panel-title">MOVE LIST</div>
      <div id="moveList"><span style="color:#5a4a30;font-size:.75rem">No moves yet.</span></div>
    </div>

    <!-- PGN -->
    <div class="panel">
      <div class="panel-title">PGN · SAVE / LOAD</div>
      <textarea id="pgnArea" placeholder="PGN appears here..."></textarea>
      <div class="file-row">
        <button class="btn" onclick="savePGN()" style="flex:1">💾 Save PGN</button>
        <button class="btn" onclick="document.getElementById('fileInput').click()" style="flex:1">📂 Load PGN</button>
      </div>
      <button class="btn" onclick="loadFromTextarea()">↩ Import from above</button>
      <input type="file" id="fileInput" accept=".pgn,.txt" onchange="loadPGNFile(event)">
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalMsg"></p>
    <div class="modal-btns">
      <button class="btn" id="modalOk">OK</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const COLS=9,ROWS=10,CELL=50,PAD=25;
const PIECE_NAMES={K:'将',k:'将',A:'仕',a:'士',B:'相',b:'象',N:'马',n:'馬',R:'车',r:'車',C:'炮',c:'砲',P:'兵',p:'卒'};
const COL_RED=['九','八','七','六','五','四','三','二','一'];
const COL_BLK=['1','2','3','4','5','6','7','8','9'];
const INIT=[
  ['r','n','b','a','k','a','b','n','r'],
  ['','','','','','','','',''],
  ['','c','','','','','','c',''],
  ['p','','p','','p','','p','','p'],
  ['','','','','','','','',''],
  ['','','','','','','','',''],
  ['P','','P','','P','','P','','P'],
  ['','C','','','','','','C',''],
  ['','','','','','','','',''],
  ['R','N','B','A','K','A','B','N','R']
];
let board=[],currentTurn='red',selectedCell=null,moveHistory=[],boardHistory=[],currentMoveIndex=0,gameOver=false;
function clone(b){return b.map(r=>[...r])}
function isRed(p){return p&&p===p.toUpperCase()}
function isBlack(p){return p&&p===p.toLowerCase()}
function sameTeam(a,b){if(!a||!b)return false;return(isRed(a)&&isRed(b))||(isBlack(a)&&isBlack(b))}
function inB(c,r){return c>=0&&c<COLS&&r>=0&&r<ROWS}

function newGame(){
  board=INIT.map(r=>[...r]);
  currentTurn='red';selectedCell=null;moveHistory=[];boardHistory=[clone(board)];currentMoveIndex=0;gameOver=false;
  updateUI();render();
  clockReset();
}

function getRaw(b,col,row,piece){
  const p=piece.toUpperCase(),moves=[],fr=isRed(piece)?isRed:isBlack,en=isRed(piece)?isBlack:isRed;
  if(p==='R'){for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){let c=col+dc,r=row+dr;while(inB(c,r)){if(fr(b[r][c]))break;moves.push([c,r]);if(en(b[r][c]))break;c+=dc;r+=dr;}}}
  else if(p==='N'){const steps=[[[0,-1],[[-1,-2],[1,-2]]],[[0,1],[[-1,2],[1,2]]],[[-1,0],[[-2,-1],[-2,1]]],[[1,0],[[2,-1],[2,1]]]];for(const[leg,ends]of steps){const lc=col+leg[0],lr=row+leg[1];if(!inB(lc,lr)||b[lr][lc])continue;for(const[ec,er]of ends){const tc=col+ec,tr=row+er;if(inB(tc,tr)&&!fr(b[tr][tc]))moves.push([tc,tr]);}}}
  else if(p==='B'){for(const[dc,dr]of[[1,1],[1,-1],[-1,1],[-1,-1]]){const mc=col+dc,mr=row+dr,tc=col+2*dc,tr=row+2*dr;if(!inB(tc,tr))continue;if(isRed(piece)&&tr<5)continue;if(isBlack(piece)&&tr>4)continue;if(inB(mc,mr)&&b[mr][mc])continue;if(!fr(b[tr][tc]))moves.push([tc,tr]);}}
  else if(p==='A'){const pr=isRed(piece)?[7,8,9]:[0,1,2],pc=[3,4,5];for(const[dc,dr]of[[1,1],[1,-1],[-1,1],[-1,-1]]){const tc=col+dc,tr=row+dr;if(pc.includes(tc)&&pr.includes(tr)&&!fr(b[tr][tc]))moves.push([tc,tr]);}}
  else if(p==='K'){const pr=isRed(piece)?[7,8,9]:[0,1,2],pc=[3,4,5];for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){const tc=col+dc,tr=row+dr;if(pc.includes(tc)&&pr.includes(tr)&&!fr(b[tr][tc]))moves.push([tc,tr]);}}
  else if(p==='C'){for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){let c=col+dc,r=row+dr,jumped=false;while(inB(c,r)){if(!jumped){if(!b[r][c])moves.push([c,r]);else jumped=true;}else{if(b[r][c]){if(en(b[r][c]))moves.push([c,r]);break;}}c+=dc;r+=dr;}}}
  else if(p==='P'){if(isRed(piece)){if(inB(col,row-1)&&!fr(b[row-1][col]))moves.push([col,row-1]);if(row<=4){if(inB(col+1,row)&&!fr(b[row][col+1]))moves.push([col+1,row]);if(inB(col-1,row)&&!fr(b[row][col-1]))moves.push([col-1,row]);}}else{if(inB(col,row+1)&&!fr(b[row+1][col]))moves.push([col,row+1]);if(row>=5){if(inB(col+1,row)&&!fr(b[row][col+1]))moves.push([col+1,row]);if(inB(col-1,row)&&!fr(b[row][col-1]))moves.push([col-1,row]);}}}
  return moves;
}

function findKing(b,color){const k=color==='red'?'K':'k';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(b[r][c]===k)return[c,r];return null;}

function isInCheck(b,color){
  const kp=findKing(b,color);if(!kp)return false;
  const[kc,kr]=kp,opp=color==='red'?'black':'red';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const p=b[r][c];if(!p)continue;if((color==='red'&&isRed(p))||(color==='black'&&isBlack(p)))continue;if(getRaw(b,c,r,p).some(([tc,tr])=>tc===kc&&tr===kr))return true;}
  const ok=findKing(b,opp);
  if(ok&&ok[0]===kc){let bl=false;const mn=Math.min(kr,ok[1]),mx=Math.max(kr,ok[1]);for(let rr=mn+1;rr<mx;rr++)if(b[rr][kc]){bl=true;break;}if(!bl)return true;}
  return false;
}

function getLegal(b,col,row){
  const piece=b[row][col];if(!piece)return[];
  return getRaw(b,col,row,piece).filter(([tc,tr])=>{const nb=clone(b);nb[tr][tc]=piece;nb[row][col]='';return!isInCheck(nb,isRed(piece)?'red':'black');});
}

function hasAnyLegal(b,color){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const p=b[r][c];if(!p)continue;if(color==='red'&&!isRed(p))continue;if(color==='black'&&!isBlack(p))continue;if(getLegal(b,c,r).length>0)return true;}return false;
}

function toNot(piece,fc,fr_,tc,tr){
  const pn=PIECE_NAMES[piece]||piece,red=isRed(piece);
  const fcn=red?COL_RED[fc]:COL_BLK[fc];
  const dr=tr-fr_;let dir,num;
  const diag=['N','n','B','b','A','a'].includes(piece);
  if(dr===0){dir='平';num=red?COL_RED[tc]:COL_BLK[tc];}
  else if((red&&dr<0)||(!red&&dr>0)){dir='进';num=diag?(red?COL_RED[tc]:COL_BLK[tc]):Math.abs(dr).toString();}
  else{dir='退';num=diag?(red?COL_RED[tc]:COL_BLK[tc]):Math.abs(dr).toString();}
  return`${pn}${fcn}${dir}${num}`;
}

function makeMove(fc,fr_,tc,tr){
  const piece=board[fr_][fc],captured=board[tr][tc],notation=toNot(piece,fc,fr_,tc,tr);
  if(currentMoveIndex<moveHistory.length){moveHistory=moveHistory.slice(0,currentMoveIndex);boardHistory=boardHistory.slice(0,currentMoveIndex+1);}
  board[tr][tc]=piece;board[fr_][fc]='';
  moveHistory.push({fromCol:fc,fromRow:fr_,toCol:tc,toRow:tr,piece,captured,notation});
  boardHistory.push(clone(board));currentMoveIndex=moveHistory.length;
  currentTurn=currentTurn==='red'?'black':'red';selectedCell=null;
  const opp=currentTurn;
  if(!hasAnyLegal(board,opp)){gameOver=true;const w=opp==='red'?'Black':'Red';setStatus(`${w==='Red'?'🔴':'⚫'} Checkmate! ${w} wins!`,'checkmate');}
  else if(isInCheck(board,currentTurn)){setStatus(`${currentTurn==='red'?'🔴 Red':'⚫ Black'} is in CHECK!`,'check');}
  else{setStatus(`${currentTurn==='red'?'🔴 Red':'⚫ Black'}'s Turn`,currentTurn+'-turn');}
  updateMoveList();updateNavButtons();document.getElementById('pgnArea').value=generatePGN();
  clockSwitch();
  render();
}

function handleClick(col,row){
  if(gameOver)return;
  if(currentMoveIndex<moveHistory.length){goToMove(moveHistory.length);return;}
  const piece=board[row][col];
  if(selectedCell){
    const[sc,sr]=selectedCell,legal=getLegal(board,sc,sr);
    if(legal.some(([tc,tr])=>tc===col&&tr===row)){makeMove(sc,sr,col,row);return;}
    selectedCell=null;
  }
  if(piece&&((currentTurn==='red'&&isRed(piece))||(currentTurn==='black'&&isBlack(piece)))){selectedCell=[col,row];}
  render();
}

function goToMove(idx){
  idx=Math.max(0,Math.min(idx,moveHistory.length));currentMoveIndex=idx;
  board=clone(boardHistory[idx]);selectedCell=null;
  if(idx<moveHistory.length){setStatus(`Viewing move ${idx} / ${moveHistory.length}`,idx%2===0?'red-turn':'black-turn');}
  else if(!gameOver){currentTurn=moveHistory.length%2===0?'red':'black';setStatus(`${currentTurn==='red'?'🔴 Red':'⚫ Black'}'s Turn`,currentTurn+'-turn');}
  updateMoveList();updateNavButtons();render();
}

function generatePGN(){
  const d=new Date(),ds=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  let pgn=`[Game "Xiangqi"]\n[Date "${ds}"]\n[Result "${gameOver?(currentTurn==='red'?'0-1':'1-0'):'*'}"]\n\n`;
  for(let i=0;i<moveHistory.length;i++){if(i%2===0)pgn+=`${Math.floor(i/2)+1}. `;pgn+=moveHistory[i].notation+' ';}
  return pgn.trim();
}

function savePGN(){
  const pgn=generatePGN();document.getElementById('pgnArea').value=pgn;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([pgn],{type:'text/plain'}));a.download=`xiangqi_${Date.now()}.pgn`;a.click();
}

function loadFromTextarea(){parsePGN(document.getElementById('pgnArea').value.trim());}
function loadPGNFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('pgnArea').value=ev.target.result;parsePGN(ev.target.result);};r.readAsText(f);e.target.value='';}

function parsePGN(pgn){
  newGame();
  const lines=pgn.split('\n').filter(l=>!l.startsWith('[')&&l.trim());
  const tokens=lines.join(' ').replace(/\d+\.\s*/g,' ').trim().split(/\s+/).filter(Boolean);
  tokens.forEach(tok=>{if(['1-0','0-1','1/2-1/2','*'].includes(tok))return;applyNot(tok);});
  goToMove(0);setTimeout(()=>goToMove(moveHistory.length),50);
}

function applyNot(notation){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=board[r][c];if(!p)continue;
    if(currentTurn==='red'&&!isRed(p))continue;if(currentTurn==='black'&&!isBlack(p))continue;
    const legal=getLegal(board,c,r);
    for(const[tc,tr]of legal){if(toNot(p,c,r,tc,tr)===notation){makeMove(c,r,tc,tr);return;}}
  }
}

function setStatus(msg,cls){const el=document.getElementById('status');el.textContent=msg;el.className=cls||'';}

function updateMoveList(){
  const el=document.getElementById('moveList');
  if(!moveHistory.length){el.innerHTML='<span style="color:#5a4a30;font-size:.75rem">No moves yet.</span>';return;}
  let html='';
  for(let i=0;i<moveHistory.length;i+=2){
    const num=Math.floor(i/2)+1,m1=moveHistory[i],m2=moveHistory[i+1];
    const c1=currentMoveIndex===i+1,c2=currentMoveIndex===i+2;
    html+=`<div class="move-pair"><span class="move-num">${num}.</span><span class="mv${c1?' current':''}" onclick="goToMove(${i+1})" style="color:#e07060">${m1.notation}</span>${m2?`<span class="mv${c2?' current':''}" onclick="goToMove(${i+2})" style="color:#9090a0">${m2.notation}</span>`:''}</div>`;
  }
  el.innerHTML=html;
  const cur=el.querySelector('.current');if(cur)el.scrollTop=cur.offsetTop-el.clientHeight/2;
}

function updateNavButtons(){
  document.getElementById('btnStart').disabled=currentMoveIndex===0;
  document.getElementById('btnPrev').disabled=currentMoveIndex===0;
  document.getElementById('btnNext').disabled=currentMoveIndex>=moveHistory.length;
  document.getElementById('btnEnd').disabled=currentMoveIndex>=moveHistory.length;
}

function updateUI(){
  if(!gameOver)setStatus(`${currentTurn==='red'?'🔴 Red':'⚫ Black'}'s Turn`,currentTurn+'-turn');
  updateMoveList();updateNavButtons();document.getElementById('pgnArea').value=generatePGN();
}

function confirmResign(){showModal('Resign?',`${currentTurn==='red'?'Red':'Black'} resigns. The opponent wins.`,()=>{gameOver=true;const w=currentTurn==='red'?'Black':'Red';setStatus(`${w} wins by resignation!`,'checkmate');updateMoveList();});}
function showModal(title,msg,onOk){document.getElementById('modalTitle').textContent=title;document.getElementById('modalMsg').textContent=msg;document.getElementById('modalOk').onclick=()=>{closeModal();onOk();};document.getElementById('modalOverlay').classList.add('open');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

// ── CANVAS RENDERING ──
const canvas=document.getElementById('boardCanvas'),ctx=canvas.getContext('2d');
function xy(col,row){return[PAD+col*CELL,PAD+row*CELL];}

function render(){
  const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#c8922a';ctx.fillRect(0,0,W,H);
  for(let i=0;i<H;i+=3){ctx.strokeStyle=`rgba(100,60,10,${.03+.02*Math.sin(i*.1)})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
  ctx.strokeStyle='#7a4f10';ctx.lineWidth=1;
  for(let c=0;c<COLS;c++){const x=PAD+c*CELL;if(c===0||c===COLS-1){ctx.beginPath();ctx.moveTo(x,PAD);ctx.lineTo(x,PAD+9*CELL);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(x,PAD);ctx.lineTo(x,PAD+4*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(x,PAD+5*CELL);ctx.lineTo(x,PAD+9*CELL);ctx.stroke();}}
  for(let r=0;r<ROWS;r++){const y=PAD+r*CELL;ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(PAD+8*CELL,y);ctx.stroke();}
  ctx.fillStyle='rgba(100,60,10,.4)';ctx.font='bold 14px "Noto Serif SC",serif';ctx.textAlign='center';
  ctx.fillText('楚  河',PAD+1.7*CELL,PAD+4.65*CELL);ctx.fillText('汉  界',PAD+6.3*CELL,PAD+4.65*CELL);
  ctx.strokeStyle='#7a4f10';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD+3*CELL,PAD);ctx.lineTo(PAD+5*CELL,PAD+2*CELL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD+5*CELL,PAD);ctx.lineTo(PAD+3*CELL,PAD+2*CELL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD+3*CELL,PAD+7*CELL);ctx.lineTo(PAD+5*CELL,PAD+9*CELL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(PAD+5*CELL,PAD+7*CELL);ctx.lineTo(PAD+3*CELL,PAD+9*CELL);ctx.stroke();
  drawX([[1,2],[7,2],[1,7],[7,7]]);
  drawX([[0,3],[2,3],[4,3],[6,3],[8,3],[0,6],[2,6],[4,6],[6,6],[8,6]]);
  if(currentMoveIndex>0){const lm=moveHistory[currentMoveIndex-1];for(const[c,r]of[[lm.fromCol,lm.fromRow],[lm.toCol,lm.toRow]]){const[x,y]=xy(c,r);ctx.fillStyle='rgba(200,180,60,.2)';ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();}}
  let legal=[];
  if(selectedCell&&currentMoveIndex>=moveHistory.length){
    const[sc,sr]=selectedCell;legal=getLegal(board,sc,sr);
    const[sx,sy]=xy(sc,sr);ctx.fillStyle='rgba(255,220,80,.35)';ctx.beginPath();ctx.arc(sx,sy,22,0,Math.PI*2);ctx.fill();
  }
  for(const[tc,tr]of legal){const[x,y]=xy(tc,tr);if(board[tr][tc]){ctx.strokeStyle='rgba(255,200,50,.7)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.stroke();}else{ctx.fillStyle='rgba(255,210,60,.55)';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();}}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const p=board[r][c];if(p)drawPiece(p,c,r);}
}

function drawX(positions){
  const arm=6,gap=3;ctx.strokeStyle='#7a4f10';ctx.lineWidth=1;
  for(const[c,r]of positions){
    const[x,y]=xy(c,r),L=c>0,R=c<COLS-1,T=r>0,Bo=r<ROWS-1;
    if(L&&T){ctx.beginPath();ctx.moveTo(x-gap,y-arm);ctx.lineTo(x-gap,y);ctx.moveTo(x-arm,y-gap);ctx.lineTo(x,y-gap);ctx.stroke();}
    if(R&&T){ctx.beginPath();ctx.moveTo(x+gap,y-arm);ctx.lineTo(x+gap,y);ctx.moveTo(x+arm,y-gap);ctx.lineTo(x,y-gap);ctx.stroke();}
    if(L&&Bo){ctx.beginPath();ctx.moveTo(x-gap,y+arm);ctx.lineTo(x-gap,y);ctx.moveTo(x-arm,y+gap);ctx.lineTo(x,y+gap);ctx.stroke();}
    if(R&&Bo){ctx.beginPath();ctx.moveTo(x+gap,y+arm);ctx.lineTo(x+gap,y);ctx.moveTo(x+arm,y+gap);ctx.lineTo(x,y+gap);ctx.stroke();}
  }
}

function drawPiece(piece,col,row){
  const[x,y]=xy(col,row),red=isRed(piece),R=20;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=6;ctx.shadowOffsetY=3;
  const og=ctx.createRadialGradient(x-4,y-4,2,x,y,R+2);
  if(red){og.addColorStop(0,'#d06050');og.addColorStop(1,'#7a1510');}else{og.addColorStop(0,'#505050');og.addColorStop(1,'#101010');}
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,R+2,0,Math.PI*2);ctx.fill();ctx.restore();
  const fg=ctx.createRadialGradient(x-5,y-5,2,x,y,R);
  if(red){fg.addColorStop(0,'#f08070');fg.addColorStop(.5,'#c03020');fg.addColorStop(1,'#801010');}
  else{fg.addColorStop(0,'#706050');fg.addColorStop(.5,'#201a10');fg.addColorStop(1,'#0a0808');}
  ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=red?'rgba(255,180,150,.5)':'rgba(200,160,80,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,R-4,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle=red?'#ffe0c0':'#d4a060';ctx.font='bold 16px "Noto Serif SC",serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(PIECE_NAMES[piece]||piece,x,y+1);
}

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect(),sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
  const col=Math.round((mx-PAD)/CELL),row=Math.round((my-PAD)/CELL);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  handleClick(col,row);
});

// ── CLOCK ──
let clkRed=0,clkBlack=0,clkInc=5,clkActive=null,clkTimer=null,clkRunning=false;

function clkMins(){return parseInt(document.getElementById('settingMin').value)||20;}
function clkIncSec(){return parseInt(document.getElementById('settingInc').value)||0;}

function clkFmt(ms){
  const tot=Math.max(0,Math.ceil(ms/1000));
  const m=Math.floor(tot/60),s=tot%60;
  return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function clockReset(){
  clearInterval(clkTimer);clkTimer=null;clkRunning=false;
  clkInc=clkIncSec();
  clkRed=clkBlack=clkMins()*60*1000;
  clkActive=null;
  renderClock();
  document.getElementById('btnClockStart').disabled=false;
  document.getElementById('btnClockPause').disabled=true;
}

function clockStart(){
  if(clkRunning)return;
  if(clkActive===null)clkActive=currentTurn;
  clkRunning=true;
  document.getElementById('btnClockStart').disabled=true;
  document.getElementById('btnClockPause').disabled=false;
  let last=Date.now();
  clkTimer=setInterval(()=>{
    const now=Date.now(),dt=now-last;last=now;
    if(clkActive==='red'){
      clkRed=Math.max(0,clkRed-dt);
      if(clkRed===0){flagged('red');return;}
    }else{
      clkBlack=Math.max(0,clkBlack-dt);
      if(clkBlack===0){flagged('black');return;}
    }
    renderClock();
  },100);
  renderClock();
}

function clockPause(){
  if(!clkRunning)return;
  clearInterval(clkTimer);clkTimer=null;clkRunning=false;
  document.getElementById('btnClockStart').disabled=false;
  document.getElementById('btnClockPause').disabled=true;
}

function clockSwitch(){
  if(!clkRunning||clkActive===null)return;
  if(clkActive==='red')clkRed+=clkInc*1000;
  else clkBlack+=clkInc*1000;
  clkActive=clkActive==='red'?'black':'red';
  renderClock();
}

function flagged(color){
  clearInterval(clkTimer);clkTimer=null;clkRunning=false;
  gameOver=true;
  const winner=color==='red'?'Black':'Red';
  setStatus(`⏰ Time! ${winner} wins on time!`,'checkmate');
  document.getElementById(color==='red'?'clockRed':'clockBlack').classList.add('flagged');
  document.getElementById(color==='red'?'timeRed':'timeBlack').textContent='00:00';
  document.getElementById('btnClockStart').disabled=true;
  document.getElementById('btnClockPause').disabled=true;
}

function renderClock(){
  const tr=document.getElementById('timeRed'),tb=document.getElementById('timeBlack');
  const cr=document.getElementById('clockRed'),cb=document.getElementById('clockBlack');
  const lr=document.getElementById('lblRed'),lb=document.getElementById('lblBlack');
  tr.textContent=clkFmt(clkRed);tb.textContent=clkFmt(clkBlack);
  cr.className='clock-side'+(clkActive==='red'?' active':'')+(clkRed>0&&clkRed<=10000?' low':'');
  cb.className='clock-side'+(clkActive==='black'?' active':'')+(clkBlack>0&&clkBlack<=10000?' low':'');
  tr.className='clock-time'+(clkRed>0&&clkRed<=10000?' low':'');
  tb.className='clock-time'+(clkBlack>0&&clkBlack<=10000?' low':'');
  lr.className='clock-label'+(clkActive==='red'?' active':'');
  lb.className='clock-label'+(clkActive==='black'?' active':'');
}

newGame();
